databases:
  - name: kimi-quiz-db
    plan: free
    databaseName: kimi_quiz
    user: kimi_user

services:
  - type: web
    name: kimi-quiz
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npm run db:push
    startCommand: node dist/boot.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kimi-quiz-db
          property: connectionString
      - key: MOONSHOT_API_KEY
        sync: false
      - key: MOONSHOT_API_URL
        value: https://api.moonshot.cn/v1
      - key: APP_ID
        value: kimi-quiz
      - key: APP_SECRET
        generateValue: true
